[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "threadkeeper"
version = "0.4.1"
description = "Multi-agent shared brain across Claude Code/Desktop, Codex, Gemini, Copilot, VS Code. Cross-session memory, self-improving skill loops, inter-agent signaling — one local MCP server."
requires-python = ">=3.11"
authors = [{ name = "thread-keeper contributors" }]
license = { text = "MIT" }
readme = "README.md"
keywords = [
    "mcp", "model-context-protocol", "claude", "codex", "gemini",
    "copilot", "memory", "agents", "self-improving", "skills",
]
classifiers = [
    "Development Status :: 4 - Beta",
    "License :: OSI Approved :: MIT License",
    "Operating System :: MacOS",
    "Operating System :: POSIX :: Linux",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "mcp>=1.0.0",
]

[project.optional-dependencies]
# Semantic cross-language search + sub-linear vector index. Recommended
# for any real use — without it, dialog_search falls back to FTS5 only.
semantic = [
    "sentence-transformers>=2.2.0",
    "numpy>=1.24.0",
    "sqlite-vec>=0.1.9",
]
# Test runner + coverage.
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
]

[project.urls]
Homepage      = "https://github.com/po4erk91/thread-keeper"
Repository    = "https://github.com/po4erk91/thread-keeper"
Issues        = "https://github.com/po4erk91/thread-keeper/issues"
Documentation = "https://github.com/po4erk91/thread-keeper#readme"
Changelog     = "https://github.com/po4erk91/thread-keeper/releases"

[project.scripts]
# After `pip install threadkeeper`, the user gets `thread-keeper-setup`
# directly on PATH. Equivalent to `python -m threadkeeper._setup`.
thread-keeper-setup = "threadkeeper._setup:main"

[tool.setuptools.packages.find]
include = ["threadkeeper*"]
exclude = ["tests*", "scripts*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q --strict-markers"
markers = [
    "slow: tests >1s (semantic embed warmup, file scan)",
]
filterwarnings = [
    "ignore::DeprecationWarning",
]

# ──────────────────────────────────────────────────────────────────────
# python-semantic-release — automated version bumps from Conventional
# Commits on main. Invoked by .github/workflows/release.yml; not used
# locally. Mapping per the user-stated policy "каждый коммит бампит":
#   feat:       → minor (X.Y → X.(Y+1).0)
#   everything: → patch (X.Y.Z → X.Y.(Z+1))
#   BREAKING:   → minor while we're still in 0.x (major_on_zero=false),
#                 promote manually to 1.0.0 when ready
# ──────────────────────────────────────────────────────────────────────
[tool.semantic_release]
version_toml = ["pyproject.toml:project.version"]
commit_parser = "conventional"
# 0.x → 0.x for BREAKING. Manual jump to 1.0.0 when API is stable.
major_on_zero = false
allow_zero_version = true
tag_format = "v{version}"
# We don't build inside the release workflow; the existing publish.yml
# handles sdist/wheel + PyPI on tag push. release.yml just bumps + tags.
build_command = ""
# Append a CHANGELOG.md entry per release. Committed back to main along
# with the version bump in a single auto-commit.
changelog_file = "CHANGELOG.md"
upload_to_vcs_release = true

[tool.semantic_release.commit_parser_options]
# Mirror the type list enforced by .github/workflows/pr-title.yml
# (allowed_tags must be a superset of what `feat`/`fix`/etc. commits use).
allowed_tags = [
    "feat", "fix", "perf", "refactor", "docs",
    "test", "chore", "ci", "build", "deps", "revert",
]
# feat is the only minor-bump tag — everything else patches.
minor_tags = ["feat"]
patch_tags = [
    "fix", "perf", "refactor", "docs", "test",
    "chore", "ci", "build", "deps", "revert",
]

[tool.semantic_release.branches.main]
match = "main"
prerelease = false

[tool.semantic_release.remote]
type = "github"
