name: Feature request
description: Propose a new capability or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: |
        What's the user-facing pain or missing capability? Concrete
        scenarios beat abstract wishes.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: |
        What you'd like to see happen. API shape, env knob, new MCP
        tool, new adapter, etc.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: |
        Workarounds you tried, existing tools that almost solve it,
        designs you rejected.

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - Small (single function / config knob)
        - Medium (new MCP tool / module)
        - Large (new adapter / daemon / breaking change)
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: Sanity checks
      options:
        - label: I searched existing issues and didn't find a duplicate
          required: true
