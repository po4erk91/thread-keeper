name: release

# Auto-bump version + create annotated tag + GitHub release based on
# Conventional Commits on main. Wired in three layers:
#
#   1. PR titles enforced as Conventional Commits by pr-title.yml.
#      Repo uses squash-merge, so the PR title becomes the commit
#      message on main.
#   2. THIS workflow runs after tests pass on main: python-semantic-
#      release reads commits since the last tag, decides bump level
#      (feat → minor, everything else → patch, BREAKING → minor while
#      still in 0.x — see major_on_zero=false in pyproject.toml),
#      writes the new version into pyproject.toml + CHANGELOG.md, and
#      creates an annotated tag vX.Y.Z.
#   3. The tag push triggers publish.yml, which builds sdist+wheel and
#      uploads to PyPI via the Trusted Publisher OIDC flow. Default
#      GITHUB_TOKEN tag pushes don't normally trigger downstream
#      workflows (a deliberate GitHub safety against loops), so the
#      final step here invokes publish.yml explicitly via
#      `gh workflow run` — no PAT required as long as the workflow has
#      `actions: write` permission.
#
# Manual override: workflow_dispatch lets you force a release run from
# the Actions tab if the auto-trigger missed (e.g. tests workflow was
# cancelled and re-run later).

on:
  workflow_run:
    workflows: ["tests"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

# Don't run two releases in parallel — they'd race on the tag namespace
# and on the pyproject.toml bump commit. cancel-in-progress=false so a
# release-in-flight wins; later triggers wait their turn rather than
# being killed mid-tag.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Compute version + tag + GitHub release
    runs-on: ubuntu-latest
    # Only release when the upstream tests workflow succeeded, or when
    # manually dispatched. Skips no-op runs (already-released SHAs,
    # commits without releasable types).
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: write  # push tag + version-bump commit + GitHub release
      actions: write   # trigger publish.yml after tag lands
      id-token: write  # OIDC, in case semantic-release needs it later
    steps:
      - name: Checkout (full history for commit walk)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # MUST check out the branch by name, not the head SHA, or
          # python-semantic-release lands in a detached-HEAD state and
          # bails with "cannot match any release groups". When triggered
          # via workflow_run we lose the original ref, so pin to `main`
          # explicitly. Race risk if main moves between tests passing
          # and the release run is accepted — head_sha would have been
          # safer there, but the branch-config requirement wins.
          ref: main
          # Use RELEASE_PAT for both checkout and the eventual push.
          # Classic branch protection on main (required status checks
          # + linear history + no force push) blocks the default
          # GITHUB_TOKEN from pushing the version-bump commit:
          #   "GH006: Protected branch update failed for refs/heads/main"
          # enforce_admins=false means the admin (you) bypasses the
          # rules, but github-actions[bot] isn't an admin. A
          # fine-grained PAT owned by the admin, with contents:write
          # on this repo, IS admin and bypasses. Create one at
          # github.com → Settings → Developer settings → Personal
          # access tokens → Fine-grained → repo=thread-keeper,
          # permissions: contents=read+write, metadata=read. Save as
          # repo secret RELEASE_PAT. Falls back to GITHUB_TOKEN if
          # unset — the release will compute the version but fail to
          # push, which is loud and obvious.
          token: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}

      - name: python-semantic-release
        id: release
        uses: python-semantic-release/python-semantic-release@v9
        with:
          github_token: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
          push: "true"
          changelog: "true"
          vcs_release: "true"

      - name: Trigger PyPI publish on the new tag
        # Skip when this commit didn't produce a release (e.g. only
        # untagged types like 'wip:' that fell through allowed_tags).
        if: steps.release.outputs.released == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ steps.release.outputs.tag }}"
          echo "::notice::Released $tag — triggering publish.yml"
          gh workflow run publish.yml --ref "$tag"
