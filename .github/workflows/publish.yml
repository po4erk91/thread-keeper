name: publish

# Publish to PyPI from a release tag matching v* after the protected
# pypi environment admits the upload job. Two authorized tag shapes:
#  - a maintainer-signed annotated tag pushed by hand (push trigger) —
#    the backfill/override path;
#  - the unsigned annotated tag release-tag.yml creates on a tested
#    main commit and hands over via an explicit workflow_dispatch.
# The human release gate is the pypi environment approval (required
# reviewers — see docs/RELEASING.md).
# Uses PyPI's Trusted Publisher OIDC flow — no API token in repo
# secrets. Configure once on PyPI side: project → Settings → Publishing
# → "Add a new pending publisher" with repo=po4erk91/thread-keeper,
# workflow=publish.yml, environment=pypi.

on:
  push:
    tags:
      - "v*"
  # Manual trigger for re-publishing if a previous run failed (rare).
  # Choose the already-pushed signed tag in the "Use workflow from" ref picker.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  authorize:
    name: Verify release authorization
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Require v* tag ref
        env:
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
        run: |
          if [ "$REF_TYPE" != "tag" ] || [[ "$REF_NAME" != v* ]]; then
            echo "::error::publish.yml must run from a signed v* tag ref, not $REF_TYPE '$REF_NAME'."
            exit 1
          fi

      - name: Verify release tag
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          EVENT: ${{ github.event_name }}
        run: |
          ref_type="$(gh api "repos/$GITHUB_REPOSITORY/git/ref/tags/$TAG" --jq '.object.type')"
          tag_sha="$(gh api "repos/$GITHUB_REPOSITORY/git/ref/tags/$TAG" --jq '.object.sha')"

          if [ "$ref_type" != "tag" ]; then
            echo "::error::$TAG must be an annotated tag; lightweight tags cannot publish."
            exit 1
          fi

          verified="$(gh api "repos/$GITHUB_REPOSITORY/git/tags/$tag_sha" --jq '.verification.verified')"
          reason="$(gh api "repos/$GITHUB_REPOSITORY/git/tags/$tag_sha" --jq '.verification.reason')"

          if [ "$verified" = "true" ]; then
            echo "::notice::$TAG carries a verified maintainer signature."
            exit 0
          fi

          # Unsigned tags are accepted only on the explicit dispatch from
          # release-tag.yml: annotated, tagged by github-actions[bot], and
          # pointing at a commit already merged to main. Pushed unsigned
          # tags keep failing here.
          if [ "$EVENT" != "workflow_dispatch" ]; then
            echo "::error::$TAG is not a verified signed tag (reason: $reason)."
            exit 1
          fi

          tagger_email="$(gh api "repos/$GITHUB_REPOSITORY/git/tags/$tag_sha" --jq '.tagger.email')"
          if [ "$tagger_email" != "41898282+github-actions[bot]@users.noreply.github.com" ]; then
            echo "::error::$TAG is unsigned (reason: $reason) and not the release-tag.yml bot tag (tagger: $tagger_email)."
            exit 1
          fi

          commit_sha="$(gh api "repos/$GITHUB_REPOSITORY/git/tags/$tag_sha" --jq '.object.sha')"
          status="$(gh api "repos/$GITHUB_REPOSITORY/compare/main...$commit_sha" --jq '.status')"
          if [ "$status" != "identical" ] && [ "$status" != "behind" ]; then
            echo "::error::$TAG points at $commit_sha, which is not on main (compare status: $status)."
            exit 1
          fi

          echo "::notice::$TAG authorized: bot-created annotated tag on a main commit via explicit dispatch."

  build:
    name: Build distribution
    needs: authorize
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.13"

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Validate release metadata
        env:
          TAG: ${{ github.ref_name }}
        run: |
          version="$(python - <<'PY'
          import tomllib

          with open("pyproject.toml", "rb") as f:
              print(tomllib.load(f)["project"]["version"])
          PY
          )"

          if [ "$TAG" != "v$version" ]; then
            echo "::error::Tag $TAG does not match pyproject.toml version $version."
            exit 1
          fi

          grep -q "^## v${version} " CHANGELOG.md

      - name: Build sdist + wheel
        run: python -m build

      - name: Smoke-check artifacts
        run: |
          python -m pip install --upgrade twine
          twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/threadkeeper
    permissions:
      contents: read
      # OIDC token for Trusted Publisher flow.
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true

  github-release:
    name: Create GitHub Release
    needs: publish-pypi
    runs-on: ubuntu-latest
    # Auto-create the release on signed tag pushes and on explicit dispatches
    # pointed at the same tag ref.
    if: >
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0  # full history so the auto-notes can walk commits

      - name: Download dist artifacts
        uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist/

      - name: Extract release section from CHANGELOG.md
        id: notes
        env:
          TAG: ${{ github.ref_name }}
        run: |
          # Pull the section for this tag out of CHANGELOG.md. If the
          # file or the tag's section isn't present, fall back to
          # GitHub's --generate-notes (auto from commit messages).
          version="${TAG#v}"
          notes_file="$(mktemp)"
          if [ -f CHANGELOG.md ] && grep -q "^## v${version} " CHANGELOG.md; then
            awk "/^## v${version} /{flag=1; next} /^## v/{flag=0} flag" \
              CHANGELOG.md > "$notes_file"
            echo "use_file=true" >> "$GITHUB_OUTPUT"
          else
            echo "use_file=false" >> "$GITHUB_OUTPUT"
          fi
          echo "notes_path=$notes_file" >> "$GITHUB_OUTPUT"

      - name: "Create GitHub Release (with notes from CHANGELOG)"
        if: steps.notes.outputs.use_file == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file "${{ steps.notes.outputs.notes_path }}" \
            dist/*

      - name: "Create GitHub Release (fallback: auto-generated notes)"
        if: steps.notes.outputs.use_file == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            dist/*
