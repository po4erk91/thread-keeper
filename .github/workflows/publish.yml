name: publish

# Publish to PyPI on every annotated tag matching v*.
# Uses PyPI's Trusted Publisher OIDC flow — no API token in repo
# secrets. Configure once on PyPI side: project → Settings → Publishing
# → "Add a new pending publisher" with repo=po4erk91/thread-keeper,
# workflow=publish.yml, environment=pypi.

on:
  push:
    tags:
      - "v*"
  # Manual trigger for re-publishing if a previous run failed (rare).
  workflow_dispatch:

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Build sdist + wheel
        run: python -m build

      - name: Smoke-check artifacts
        run: |
          python -m pip install --upgrade twine
          twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/threadkeeper
    permissions:
      # OIDC token for Trusted Publisher flow.
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Create GitHub Release
    needs: publish-pypi
    runs-on: ubuntu-latest
    # Auto-create the release on tag pushes and on explicit dispatches
    # pointed at a tag ref (used by release-tag.yml after tests pass).
    if: >
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # full history so the auto-notes can walk commits

      - name: Download dist artifacts
        uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist/

      - name: Extract release section from CHANGELOG.md
        id: notes
        env:
          TAG: ${{ github.ref_name }}
        run: |
          # Pull the section for this tag out of CHANGELOG.md. If the
          # file or the tag's section isn't present, fall back to
          # GitHub's --generate-notes (auto from commit messages).
          version="${TAG#v}"
          notes_file="$(mktemp)"
          if [ -f CHANGELOG.md ] && grep -q "^## v${version} " CHANGELOG.md; then
            awk "/^## v${version} /{flag=1; next} /^## v/{flag=0} flag" \
              CHANGELOG.md > "$notes_file"
            echo "use_file=true" >> "$GITHUB_OUTPUT"
          else
            echo "use_file=false" >> "$GITHUB_OUTPUT"
          fi
          echo "notes_path=$notes_file" >> "$GITHUB_OUTPUT"

      - name: "Create GitHub Release (with notes from CHANGELOG)"
        if: steps.notes.outputs.use_file == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file "${{ steps.notes.outputs.notes_path }}" \
            dist/*

      - name: "Create GitHub Release (fallback: auto-generated notes)"
        if: steps.notes.outputs.use_file == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            dist/*
