name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    name: pytest (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.11 is the floor (config.py uses tomllib + dict[str,...]).
        # 3.13 is current. 3.12 sits in between.
        python: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
          cache: "pip"

      - name: Install package + test deps
        run: |
          python -m pip install --upgrade pip
          # Editable install with both optional-dep groups. semantic is
          # required: a handful of tests (test_delegated_search,
          # test_vec_search) assert on actual cosine search behavior and
          # don't have a skip-when-missing guard. sentence-transformers
          # pulls torch + numpy + sqlite-vec — ~500MB but cached between
          # runs via the pip cache action above.
          pip install -e '.[semantic,dev]'

      - name: Run pytest
        env:
          # Background daemons are forced off; tests need a quiet
          # process. Embeddings stay ON so semantic tests pass.
          THREADKEEPER_INGEST_INTERVAL_S: "0"
          THREADKEEPER_SHADOW_REVIEW_INTERVAL_S: "0"
          THREADKEEPER_SPAWN_BUDGET_POLL_S: "0"
          THREADKEEPER_SEARCH_PROXY_POLL_S: "0"
        run: |
          python -m pytest -q --tb=short
